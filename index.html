<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="darkreader-lock">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Vampire Hunter Intern — Project Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #141619;
    --surface-hover: #1c1f24;
    --border: #252830;
    --border-hover: #33363f;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --text-muted: #52525b;
    --accent: #e11d48;
    --tag-demo: #f43f5e; --tag-demo-bg: #f43f5e14;
    --tag-blue: #3b82f6; --tag-blue-bg: #3b82f614;
    --tag-green: #22c55e; --tag-green-bg: #22c55e14;
    --tag-purple: #a855f7; --tag-purple-bg: #a855f714;
    --tag-red: #ef4444; --tag-red-bg: #ef444414;
    --tag-yellow: #eab308; --tag-yellow-bg: #eab30814;
    --priority-high: #ef4444; --priority-med: #f59e0b; --priority-low: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: auto; }

  header {
    padding: 18px 24px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 100; flex-wrap: wrap; gap: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 10px var(--accent), 0 0 20px #f59e0b30;
    animation: pulse 3s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 10px var(--accent), 0 0 20px #f59e0b30; }
    50% { box-shadow: 0 0 14px var(--accent), 0 0 28px #f59e0b50; }
  }
  .board-title-wrap { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .board-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.02em; cursor: pointer;
    border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  }
  .board-title:hover { border-bottom-color: var(--text-muted); }
  .board-subtitle {
    font-size: 17px; font-weight: 400; color: var(--text-dim); cursor: pointer;
    border-bottom: 1px dashed transparent; transition: border-color 0.2s;
  }
  .board-subtitle:hover { border-bottom-color: var(--text-muted); }
  .inline-edit {
    background: var(--surface); border: 1px solid var(--accent); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 17px; padding: 2px 6px;
    border-radius: 4px; outline: none; width: 220px;
  }
  .header-right { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .filter-btn, .action-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 9px; border-radius: 5px; font-size: 11px;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--text); }
  .action-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .action-btn.active { border-color: var(--accent); color: var(--accent); }
  .action-btn .badge {
    background: var(--accent); color: #000; font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 8px; margin-left: 4px;
  }
  .hdr-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; }

  .stats {
    display: flex; gap: 16px; padding: 8px 24px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace;
  }
  .stats span { color: var(--text-dim); }

  .archive-panel {
    display: none; padding: 12px 24px 16px; border-bottom: 1px solid var(--border);
    background: #0d0e11; max-height: 300px; overflow-y: auto;
  }
  .archive-panel.open { display: block; }
  .archive-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 10px; }
  .archive-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; justify-content: space-between;
  }
  .archive-card-body { flex: 1; min-width: 0; }
  .archive-card-title { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
  .archive-card-desc { font-size: 10px; color: var(--text-dim); line-height: 1.4; }
  .archive-card-tags { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
  .archive-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .archive-btn {
    background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-dim);
    padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .archive-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .archive-btn.danger:hover { color: var(--priority-high); border-color: var(--priority-high); }

  .board {
    display: flex; gap: 12px; padding: 18px 24px;
    min-height: calc(100vh - 110px); align-items: flex-start;
  }
  .column { min-width: 288px; max-width: 288px; flex-shrink: 0; }
  .column-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 4px 12px; position: sticky; top: 66px; z-index: 10;
  }
  .column-title {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .column-dot { width: 7px; height: 7px; border-radius: 50%; cursor: pointer; transition: transform 0.15s; }
  .column-dot:hover { transform: scale(1.5); }
  .color-picker-pop {
    position: fixed; background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; display: flex; gap: 6px; z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .column-count {
    font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace;
    background: var(--surface); padding: 2px 6px; border-radius: 10px;
  }
  .column-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 14px; padding: 0 4px; opacity: 0; transition: opacity 0.15s; margin-left: 4px;
  }
  .column-header:hover .column-del { opacity: 1; }
  .column-del:hover { color: var(--priority-high); }
  .column-label { cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.2s; }
  .column-label:hover { border-bottom-color: var(--text-muted); }
  .column-label-edit {
    background: var(--surface); border: 1px solid var(--accent); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; padding: 1px 4px;
    border-radius: 3px; outline: none; width: 120px;
  }
  .column.col-dragging { opacity: 0.4; }
  .column-drop-zone {
    min-width: 4px; flex-shrink: 0; border-radius: 4px; transition: all 0.15s; align-self: stretch;
  }
  .column-drop-zone.active { background: var(--accent); min-width: 4px; box-shadow: 0 0 8px var(--accent); }
  .column-drag-handle {
    cursor: grab; padding: 0 3px; color: var(--text-muted); font-size: 10px;
    opacity: 0; transition: opacity 0.15s; user-select: none;
  }
  .column-header:hover .column-drag-handle { opacity: 0.7; }
  .column-drag-handle:active { cursor: grabbing; }

  .card-list {
    display: flex; flex-direction: column; gap: 5px;
    min-height: 60px; padding: 3px; border-radius: 7px; transition: background 0.2s;
  }
  .card-list.drag-over { background: #ffffff06; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 11px 12px; cursor: grab; transition: all 0.15s; position: relative;
  }
  .card:hover { background: var(--surface-hover); border-color: var(--border-hover); transform: translateY(-1px); box-shadow: 0 3px 10px #00000040; }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.35; transform: scale(0.97); }
  .drop-indicator { height: 2px; background: var(--accent); border-radius: 1px; margin: -1px 0; pointer-events: none; box-shadow: 0 0 6px var(--accent); }
  .card-priority { position: absolute; left: 0; top: 9px; width: 3px; height: 16px; border-radius: 0 2px 2px 0; }
  .card-actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-action-btn {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-muted);
    width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: all 0.15s;
  }
  .card-action-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .card-action-btn.danger:hover { color: var(--priority-high); border-color: var(--priority-high); }
  .card-title { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; padding-right: 48px; }
  .card-desc { font-size: 10px; color: var(--text-dim); line-height: 1.45; margin-bottom: 7px; }
  .card-footer { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
  .tag {
    font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 3px;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .tag-demo { color: var(--tag-demo); background: var(--tag-demo-bg); }
  .tag-blue { color: var(--tag-blue); background: var(--tag-blue-bg); }
  .tag-green { color: var(--tag-green); background: var(--tag-green-bg); }
  .tag-purple { color: var(--tag-purple); background: var(--tag-purple-bg); }
  .tag-red { color: var(--tag-red); background: var(--tag-red-bg); }
  .tag-yellow { color: var(--tag-yellow); background: var(--tag-yellow-bg); }
  .phase-divider {
    font-size: 10px; font-weight: 600; color: var(--accent);
    padding: 9px 5px 4px; letter-spacing: 0.04em;
    border-top: 1px solid var(--border); margin-top: 5px;
  }
  .phase-divider:first-child { border-top: none; margin-top: 0; }
  .add-card-btn {
    width: 100%; background: none; border: 1px dashed var(--border); color: var(--text-muted);
    padding: 7px; border-radius: 6px; font-size: 11px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-top: 6px;
  }
  .add-card-btn:hover { border-color: var(--accent); color: var(--text-dim); }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: #000000aa;
    z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 22px 24px; width: 420px; max-width: 92vw; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .modal label {
    display: block; font-size: 11px; font-weight: 500; color: var(--text-dim);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .modal input[type="text"], .modal textarea, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 5px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; outline: none; margin-bottom: 12px; transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal select { cursor: pointer; }
  .modal select option { background: var(--bg); }
  .tag-toggles { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag-toggle {
    padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 500;
    text-transform: uppercase; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .tag-toggle.active { border-color: currentColor; }
  .tag-toggle[data-tag="demo"].active { color: var(--tag-demo); background: var(--tag-demo-bg); }
  .tag-toggle[data-tag="blue"].active { color: var(--tag-blue); background: var(--tag-blue-bg); }
  .tag-toggle[data-tag="green"].active { color: var(--tag-green); background: var(--tag-green-bg); }
  .tag-toggle[data-tag="purple"].active { color: var(--tag-purple); background: var(--tag-purple-bg); }
  .tag-toggle[data-tag="red"].active { color: var(--tag-red); background: var(--tag-red-bg); }
  .tag-toggle[data-tag="yellow"].active { color: var(--tag-yellow); background: var(--tag-yellow-bg); }
  .color-swatches { display: flex; gap: 6px; margin-bottom: 14px; }
  .color-swatch {
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
  }
  .color-swatch.active { border-color: var(--text); transform: scale(1.15); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .modal-btn {
    padding: 7px 16px; border-radius: 5px; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; border: none;
  }
  .modal-btn.primary { background: var(--accent); color: #000; }
  .modal-btn.primary:hover { filter: brightness(1.1); }
  .modal-btn.secondary { background: var(--bg); color: var(--text-dim); border: 1px solid var(--border); }
  .modal-btn.secondary:hover { color: var(--text); border-color: var(--text-dim); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sync-status {
    font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace;
    margin-left: auto; display: flex; align-items: center; gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
  }
  .sync-dot.idle { background: var(--text-muted); }
  .sync-dot.saving { background: var(--accent); animation: pulse 0.6s ease-in-out infinite; }
  .sync-dot.ok { background: #22c55e; }
  .sync-dot.err { background: #ef4444; }
  .sync-setup-modal input[type="password"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 12px;
    margin: 6px 0 12px;
  }
  .sync-setup-modal input[type="password"]:focus { border-color: var(--accent); outline: none; }
  @media (max-width: 768px) {
    header { padding: 12px; }
    .board { padding: 12px; gap: 8px; }
    .column { min-width: 260px; max-width: 260px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo"></div>
    <div class="board-title-wrap" id="titleWrap"></div>
  </div>
  <div class="header-right">
    <button class="filter-btn active" onclick="filterTag('all',event)">All</button>
    <button class="filter-btn" onclick="filterTag('demo',event)">Demo</button>
    <button class="filter-btn" onclick="filterTag('blue',event)">Blue</button>
    <button class="filter-btn" onclick="filterTag('green',event)">Green</button>
    <button class="filter-btn" onclick="filterTag('purple',event)">Purple</button>
    <button class="filter-btn" onclick="filterTag('red',event)">Red</button>
    <button class="filter-btn" onclick="filterTag('yellow',event)">Yellow</button>
    <span class="hdr-sep"></span>
    <button class="action-btn" onclick="openAddColumnModal()">+ Category</button>
    <button class="action-btn" id="archiveToggle" onclick="toggleArchive()">Archive</button>
    <span class="hdr-sep"></span>
    <button class="action-btn" onclick="exportBoard()">Export</button>
    <button class="action-btn" onclick="document.getElementById('importFile').click()">Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBoard(event)">
    <button class="action-btn" id="syncBtn" onclick="onSyncClick()" title="Cloud sync via GitHub Gist">Sync</button>
  </div>
</header>
<div class="stats" id="stats"></div>
<div class="archive-panel" id="archivePanel"></div>
<div class="board" id="board"></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

function submitEditCard(tid){
  const title=document.getElementById('meTitle').value.trim();if(!title)return;
  const tags=[...document.querySelectorAll('.tag-toggle.active')].map(b=>b.dataset.tag);
  let phase=document.getElementById('mePhase').value;
  const task=getAllTasks().find(t=>t.id===tid);
  if(phase==='__new')phase=document.getElementById('meNewPh').value.trim()||'Uncategorized';
  else if(phase==='__rename'){
    const nw=document.getElementById('meRenPh').value.trim();
    if(nw&&task&&nw!==task.phase&&!allPhases().filter(p=>p!==task.phase).includes(nw)){
      applyPhaseRename(task.phase,nw);phase=nw;
    }else phase=task?task.phase:'Uncategorized';
  }
  const col=document.getElementById('meCol').value;
  const edits={title,desc:document.getElementById('meDesc').value.trim(),tags,priority:document.getElementById('mePri').value,phase};
  const custom=customTasks.find(t=>t.id===tid);
  if(custom){Object.assign(custom,edits,{column:col});sv('vhi-custom-tasks',customTasks)}
  else{taskEdits[tid]=edits;sv('vhi-task-edits',taskEdits)}

}

function submitNewColumn(){
  const name=document.getElementById('mcColName').value.trim();if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  if(getAllColumns().some(c=>c.id===id)){alert('Column already exists');return}
  const color=document.querySelector('.color-swatch.active')?.dataset.color||'#3f3f46';
  if(deletedColumns.includes(id)){
    // Restore a previously deleted default column with the chosen name/color
    deletedColumns=deletedColumns.filter(x=>x!==id);sv('vhi-deleted-columns',deletedColumns);
    columnRenames[id]=name;sv('vhi-column-renames',columnRenames);
    columnColors[id]=color;sv('vhi-column-colors',columnColors);

  }
  customColumns.push({id,label:name,color});sv('vhi-custom-columns',customColumns);closeModal();render();
}
function deleteColumn(cid){
  const cols=getAllColumns();
  if(cols.length<=1){alert('Cannot delete the last column.');return}
  const col=cols.find(c=>c.id===cid);if(!col)return;
  const fallback=cols.find(c=>c.id!==cid);
  if(!confirm(`Delete "${col.label}"? Cards move to "${fallback.label}".`))return;
  getAllTasks().forEach(t=>{if(getCol(t.id)===cid)setCol(t.id,fallback.id)});
  delete cardOrder[cid];sv('vhi-card-order',cardOrder);
  if(customColumns.some(c=>c.id===cid)){
    customColumns=customColumns.filter(c=>c.id!==cid);sv('vhi-custom-columns',customColumns);
  }else{
    if(!deletedColumns.includes(cid))deletedColumns.push(cid);
    sv('vhi-deleted-columns',deletedColumns);
  }
  render();
}
function changeColumnColor(colId,evt){

  pop.innerHTML=SWATCHES.map(c=>`<div class="color-swatch${c===col.color?' active':''}" style="background:${c}" data-color="${c}"></div>`).join('');
  document.body.appendChild(pop);
  const r=evt.currentTarget.getBoundingClientRect();
  pop.style.left=Math.min(r.left,window.innerWidth-pop.offsetWidth-8)+'px';
  pop.style.top=(r.bottom+6)+'px';
  pop.querySelectorAll('.color-swatch').forEach(s=>s.onclick=ev=>{
    ev.stopPropagation();
    const newColor=s.dataset.color;
    const isCust=customColumns.find(c=>c.id===colId);
    if(isCust){isCust.color=newColor;sv('vhi-custom-columns',customColumns)}
    else{columnColors[colId]=newColor;sv('vhi-column-colors',columnColors)}
    pop.remove();render();
  });
  setTimeout(()=>{
    const close=ev=>{if(!pop.contains(ev.target)){pop.remove();document.removeEventListener('click',close,true)}};
    document.addEventListener('click',close,true);

}
function renameColumn(colId){
  const hdr=document.querySelector(`.column[data-col-id="${colId}"] .column-label`);if(!hdr)return;

function renamePhase(oldName){
  const divs=document.querySelectorAll('.phase-divider');
  let target=null;divs.forEach(d=>{if(d.textContent===oldName)target=d});if(!target)return;
  const inp=document.createElement('input');inp.type='text';inp.className='inline-edit';inp.value=oldName;

  target.textContent='';target.appendChild(inp);inp.focus();inp.select();
  const fin=()=>{const nw=inp.value.trim();if(nw&&nw!==oldName&&!allPhases().filter(p=>p!==oldName).includes(nw)){applyPhaseRename(oldName,nw)}else{render()}};
  inp.onblur=fin;
  inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();fin()}if(e.key==='Escape'){render()}};
}
function applyPhaseRename(oldName,newName){
  defaultTasks.forEach(t=>{if(t.phase===oldName||(taskEdits[t.id]&&taskEdits[t.id].phase===oldName)){if(!taskEdits[t.id])taskEdits[t.id]={};taskEdits[t.id].phase=newName}});
  customTasks.forEach(t=>{if(t.phase===oldName)t.phase=newName});
  sv('vhi-task-edits',taskEdits);sv('vhi-custom-tasks',customTasks);render();
}

function render(){
  renderBoardTitle();
  const board=document.getElementById('board');board.innerHTML='';
  const cols=getAllColumns();
  const tasks=getAllTasks().filter(t=>!archivedIds.includes(t.id));

  const counts={};cols.forEach(c=>counts[c.id]=0);let total=0;
  tasks.forEach(t=>{const col=getCol(t.id);if(activeFilter==='all'||t.tags.includes(activeFilter)){counts[col]=(counts[col]||0)+1;total++}});
  const done=counts['done']||0;const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`<span>${total} tasks</span> · <span>${done} done</span> · <span>${pct}% complete</span><span class="sync-status" id="syncStatus"></span>`;

  const ab=document.getElementById('archiveToggle');
  ab.innerHTML=archivedIds.length?`Archive <span class="badge">${archivedIds.length}</span>`:'Archive';

  const ap=document.getElementById('archivePanel');
  ap.className='archive-panel'+(archiveOpen?' open':'');
  if(archiveOpen){
    const arch=getAllTasks().filter(t=>archivedIds.includes(t.id));
    ap.innerHTML=`<h3>Archived Cards (${arch.length})</h3>`+
      (arch.length===0?'<div style="font-size:11px;color:var(--text-muted)">No archived cards</div>':
      arch.map(t=>`<div class="archive-card">
        <div style="width:3px;min-height:36px;border-radius:2px;flex-shrink:0;background:${t.priority==='high'?'var(--priority-high)':t.priority==='med'?'var(--priority-med)':'var(--priority-low)'}"></div>
        <div class="archive-card-body">
          <div class="archive-card-title">${esc(t.title)}</div>
          <div class="archive-card-desc">${esc(t.desc)}</div>
          <div class="archive-card-tags">${t.tags.map(tg=>`<span class="tag tag-${tg}">${tg}</span>`).join('')}</div>
        </div>
        <div class="archive-card-actions">
          <button class="archive-btn" onclick="restoreTask(${t.id})">Restore</button>
          <button class="archive-btn danger" onclick="deleteArchivedTask(${t.id})">Delete</button>
        </div>
      </div>`).join(''));
  }

  let dragColId=null;
  cols.forEach((col,ci)=>{
    // Column drop zone before each column
    const dropZone=document.createElement('div');dropZone.className='column-drop-zone';dropZone.dataset.dropIndex=ci;
    dropZone.addEventListener('dragover',e=>{if(!e.dataTransfer.types.includes('col-id'))return;e.preventDefault();dropZone.classList.add('active')});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('active'));
    dropZone.addEventListener('drop',e=>{
      e.preventDefault();dropZone.classList.remove('active');
      const srcId=e.dataTransfer.getData('col-id');if(!srcId)return;
      const curOrder=getAllColumns().map(c=>c.id);
      const from=curOrder.indexOf(srcId);if(from===-1)return;
      curOrder.splice(from,1);
      let to=ci;if(from<ci)to--;
      curOrder.splice(to,0,srcId);
      columnOrder=curOrder;sv('vhi-column-order',columnOrder);render();
    });
    board.appendChild(dropZone);

    const colEl=document.createElement('div');colEl.className='column';colEl.dataset.colId=col.id;
    colEl.draggable=true;
    colEl.addEventListener('dragstart',e=>{
      if(e.target.closest('.card')||e.target.closest('.card-list'))return;
      e.dataTransfer.setData('col-id',col.id);e.dataTransfer.effectAllowed='move';
      colEl.classList.add('col-dragging');dragColId=col.id;
    });
    colEl.addEventListener('dragend',()=>{colEl.classList.remove('col-dragging');dragColId=null;document.querySelectorAll('.column-drop-zone').forEach(z=>z.classList.remove('active'))});
    const colTasks=tasks.filter(t=>{
      const inCol=getCol(t.id)===col.id;
      const match=activeFilter==='all'||t.tags.includes(activeFilter);
      return inCol&&match;
    });
    colEl.innerHTML=`<div class="column-header">
      <div class="column-title">
        <span class="column-drag-handle" title="Drag to reorder">⠿</span>
        <div class="column-dot" style="background:${col.color}" onclick="changeColumnColor('${col.id}',event)" title="Click to change color"></div><span class="column-label" ondblclick="renameColumn('${col.id}')" title="Double-click to rename">${esc(col.label)}</span>
        <button class="column-del" onclick="deleteColumn('${col.id}')" title="Delete">×</button>
      </div>
      <div class="column-count">${colTasks.length}</div>
    </div>`;
    const list=document.createElement('div');list.className='card-list';list.dataset.column=col.id;
    list.addEventListener('dragover',e=>{
      if(e.dataTransfer.types.includes('col-id'))return;
      e.preventDefault();list.classList.add('drag-over');removeDropIndicators();
      const{before}=getDropIndex(list,e.clientY);
      const ind=document.createElement('div');ind.className='drop-indicator';
      if(before)list.insertBefore(ind,before);else list.appendChild(ind);
    });
    list.addEventListener('dragleave',e=>{if(!list.contains(e.relatedTarget)){list.classList.remove('drag-over');removeDropIndicators()}});
    list.addEventListener('drop',e=>{
      if(e.dataTransfer.types.includes('col-id'))return;
      e.preventDefault();list.classList.remove('drag-over');removeDropIndicators();
      const tid=parseInt(e.dataTransfer.getData('text/plain'));
      const{index}=getDropIndex(list,e.clientY);
      const visibleIds=[...list.querySelectorAll('.card:not(.dragging)')].map(c=>parseInt(c.dataset.id));
      const sourceCol=getCol(tid);
      if(cardOrder[sourceCol])cardOrder[sourceCol]=cardOrder[sourceCol].filter(id=>id!==tid);
      let targetOrder=visibleIds.filter(id=>id!==tid);
      targetOrder.splice(index,0,tid);
      const hiddenInCol=(cardOrder[col.id]||[]).filter(id=>!targetOrder.includes(id)&&getAllTasks().some(t=>t.id===id&&!archivedIds.includes(id)));
      cardOrder[col.id]=[...targetOrder,...hiddenInCol];
      setCol(tid,col.id);sv('vhi-card-order',cardOrder);render();
    });

    const order=cardOrder[col.id]||[];
    colTasks.sort((a,b)=>{const ai=order.indexOf(a.id),bi=order.indexOf(b.id);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi});
    let lastPhase=null;
    colTasks.forEach(task=>{
      if(task.phase!==lastPhase){
        const div=document.createElement('div');div.className='phase-divider';div.textContent=task.phase;div.title='Double-click to rename';div.style.cursor='pointer';div.ondblclick=function(){renamePhase(task.phase)};list.appendChild(div);
        lastPhase=task.phase;
      }
      const card=document.createElement('div');card.className='card';card.draggable=true;card.dataset.id=task.id;
      card.addEventListener('dragstart',e=>{e.stopPropagation();e.dataTransfer.setData('text/plain',task.id);card.classList.add('dragging')});
      card.addEventListener('dragend',()=>{card.classList.remove('dragging');removeDropIndicators()});
      const pc=task.priority==='high'?'var(--priority-high)':task.priority==='med'?'var(--priority-med)':'var(--priority-low)';
      card.innerHTML=`
        <div class="card-priority" style="background:${pc}"></div>
        <div class="card-actions">
          <button class="card-action-btn" onclick="event.stopPropagation();openEditCardModal(${task.id})" title="Edit">✎</button>
          <button class="card-action-btn danger" onclick="event.stopPropagation();archiveTask(${task.id})" title="Archive">×</button>
        </div>
        <div class="card-title">${esc(task.title)}</div>
        <div class="card-desc">${esc(task.desc)}</div>
        <div class="card-footer"><div class="card-tags">${task.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('')}</div></div>`;
      list.appendChild(card);
    });

    if(colTasks.length===0){const e=document.createElement('div');e.style.cssText='padding:24px 12px;text-align:center;color:var(--text-muted);font-size:11px;';e.textContent='Drag cards here';list.appendChild(e)}
    const ab=document.createElement('button');ab.className='add-card-btn';ab.textContent='+ Add Card';ab.onclick=()=>openAddCardModal(col.id);
    colEl.appendChild(list);colEl.appendChild(ab);board.appendChild(colEl);
  });
  // Trailing drop zone for moving columns to the end
  const lastDrop=document.createElement('div');lastDrop.className='column-drop-zone';lastDrop.dataset.dropIndex=cols.length;
  lastDrop.addEventListener('dragover',e=>{if(!e.dataTransfer.types.includes('col-id'))return;e.preventDefault();lastDrop.classList.add('active')});
  lastDrop.addEventListener('dragleave',()=>lastDrop.classList.remove('active'));
  lastDrop.addEventListener('drop',e=>{
    e.preventDefault();lastDrop.classList.remove('active');
    const srcId=e.dataTransfer.getData('col-id');if(!srcId)return;
    const curOrder=getAllColumns().map(c=>c.id);
    const from=curOrder.indexOf(srcId);if(from===-1)return;
    curOrder.splice(from,1);curOrder.push(srcId);
    columnOrder=curOrder;sv('vhi-column-order',columnOrder);render();
  });
  board.appendChild(lastDrop);
}

const STORAGE_KEYS=['vhi-state','vhi-custom-tasks','vhi-custom-columns','vhi-archived','vhi-task-edits','vhi-board-name','vhi-card-order','vhi-column-order','vhi-column-renames','vhi-column-colors','vhi-deleted-columns'];

function exportBoard(){
  const data={};
  STORAGE_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)data[k]=JSON.parse(v)});
  data._exportDate=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`vhi-kanban-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}

function importBoard(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      const valid=STORAGE_KEYS.some(k=>k in data);
      if(!valid){alert('Not a valid Vampire Hunter Intern Kanban backup.');return}
      if(!confirm('Replace current board state with backup?\nThis will overwrite any current changes.'))return;
      STORAGE_KEYS.forEach(k=>{if(k in data)localStorage.setItem(k,JSON.stringify(data[k]));else localStorage.removeItem(k)});
      kanbanState=ld('vhi-state')||{};
      customTasks=ld('vhi-custom-tasks')||[];
      customColumns=ld('vhi-custom-columns')||[];
      archivedIds=ld('vhi-archived')||[];
      taskEdits=ld('vhi-task-edits')||{};
      boardName=ld('vhi-board-name')||{title:"Vampire Hunter Intern",subtitle:"— Exit 8-like"};
      cardOrder=ld('vhi-card-order')||{};
      columnOrder=ld('vhi-column-order')||[];
      columnRenames=ld('vhi-column-renames')||{};
      columnColors=ld('vhi-column-colors')||{};
      deletedColumns=ld('vhi-deleted-columns')||[];
      render();
    }catch(err){alert('Failed to read backup: '+err.message)}
  };
  reader.readAsText(file);
  e.target.value='';
}

// --- Gist Cloud Sync ---
function setSyncStatus(state,msg){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  const dot=state==='off'?'':'<span class="sync-dot '+state+'"></span> ';
  el.innerHTML=dot+(msg||'');
}

async function syncToGist(){
  if(!_gistToken||!_gistId)return;
  setSyncStatus('saving','syncing...');
  const data={};
  STORAGE_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)data[k]=JSON.parse(v)});
  data._syncDate=new Date().toISOString();
  try{
    const r=await fetch('https://api.github.com/gists/'+_gistId,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+_gistToken,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{'vhi-kanban-backup.json':{content:JSON.stringify(data,null,2)}}})
    });
    if(!r.ok)throw new Error(r.status+' '+r.statusText);
    localStorage.setItem('vhi-last-sync',data._syncDate);
    setSyncStatus('ok','saved');
    setTimeout(()=>setSyncStatus('ok','synced'),2000);
  }catch(e){
    console.error('Gist sync failed:',e);
    setSyncStatus('err','sync failed');
  }
}

async function loadFromGist(){
  if(!_gistToken||!_gistId)return false;
  setSyncStatus('saving','loading...');
  try{
    const r=await fetch('https://api.github.com/gists/'+_gistId+'?t='+Date.now(),{
      headers:{'Authorization':'Bearer '+_gistToken,'Accept':'application/vnd.github+json'}
    });
    if(!r.ok)throw new Error(r.status+' '+r.statusText);
    const gist=await r.json();
    const file=gist.files['vhi-kanban-backup.json'];
    if(!file){setSyncStatus('err','no backup in gist');return false}
    const data=JSON.parse(file.content);
    STORAGE_KEYS.forEach(k=>{if(k in data)localStorage.setItem(k,JSON.stringify(data[k]));else localStorage.removeItem(k)});
    reloadState();
    setSyncStatus('ok','restored from cloud');
    return true;
  }catch(e){
    console.error('Gist load failed:',e);
    setSyncStatus('err','load failed');
    return false;
  }
}

function reloadState(){
  kanbanState=ld('vhi-state')||{};
  customTasks=ld('vhi-custom-tasks')||[];
  customColumns=ld('vhi-custom-columns')||[];
  archivedIds=ld('vhi-archived')||[];
  taskEdits=ld('vhi-task-edits')||{};
  boardName=ld('vhi-board-name')||{title:"Vampire Hunter Intern",subtitle:"\u2014 Exit 8-like"};
  cardOrder=ld('vhi-card-order')||{};
  columnOrder=ld('vhi-column-order')||[];
  columnRenames=ld('vhi-column-renames')||{};
  columnColors=ld('vhi-column-colors')||{};
  deletedColumns=ld('vhi-deleted-columns')||[];
}

function onSyncClick(){
  if(_gistToken&&_gistId){openSyncMenu()}
  else{openSyncSetup()}
}

function openSyncSetup(){
  document.getElementById('modalContent').innerHTML=`
    <div class="sync-setup-modal">
    <h2>Cloud Sync Setup</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">Saves your board to a private GitHub Gist automatically.</p>
    <label>GitHub Personal Access Token <span style="font-size:10px;color:var(--text-muted)">(gist scope)</span></label>
    <input type="password" id="gistTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <p style="font-size:10px;color:var(--text-muted);margin-bottom:16px;">Create one at github.com/settings/tokens &mdash; only needs the <strong>gist</strong> scope.</p>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
      <button class="modal-btn primary" onclick="submitSyncSetup()">Connect</button>
    </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

async function submitSyncSetup(){
  const token=document.getElementById('gistTokenInput').value.trim();
  if(!token)return;
  const actions=document.getElementById('modalContent').querySelector('.modal-actions');
  actions.innerHTML='<span style="font-size:12px;color:var(--text-dim)">Looking for existing backup...</span>';
  try{
    const listR=await fetch('https://api.github.com/gists?per_page=100',{
      headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}
    });
    if(!listR.ok)throw new Error('Failed to list gists: '+listR.statusText);
    const gists=await listR.json();
    const existing=gists.find(g=>g.description==='Vampire Hunter Intern Kanban Backup'&&g.files['vhi-kanban-backup.json']);
    if(existing){
      _gistToken=token;_gistId=existing.id;
      localStorage.setItem('vhi-gist-token',JSON.stringify(token));
      localStorage.setItem('vhi-gist-id',JSON.stringify(existing.id));
      closeModal();updateSyncBtn();
      setSyncStatus('ok','connected (existing gist)');
      const hasData=STORAGE_KEYS.some(k=>localStorage.getItem(k)!==null);
      if(!hasData||confirm('Found existing cloud backup. Restore it now?')){
        await loadFromGist();render();
      }
      return;
    }
    actions.innerHTML='<span style="font-size:12px;color:var(--text-dim)">Creating new backup...</span>';
    const data={};
    STORAGE_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)data[k]=JSON.parse(v)});
    data._syncDate=new Date().toISOString();
    const r=await fetch('https://api.github.com/gists',{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({description:'Vampire Hunter Intern Kanban Backup','public':false,files:{'vhi-kanban-backup.json':{content:JSON.stringify(data,null,2)}}})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.message||r.statusText)}
    const gist=await r.json();
    _gistToken=token;_gistId=gist.id;
    localStorage.setItem('vhi-gist-token',JSON.stringify(token));
    localStorage.setItem('vhi-gist-id',JSON.stringify(gist.id));
    closeModal();updateSyncBtn();
    setSyncStatus('ok','connected (new gist)');
  }catch(e){
    alert('Failed to connect: '+e.message);
    actions.innerHTML='<button class="modal-btn secondary" onclick="closeModal()">Cancel</button><button class="modal-btn primary" onclick="submitSyncSetup()">Retry</button>';
  }
}

function openSyncMenu(){
  document.getElementById('modalContent').innerHTML=`
    <h2>Cloud Sync</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">Connected to GitHub Gist.</p>
    <div class="modal-actions" style="flex-direction:column;gap:6px;">
      <button class="modal-btn primary" style="width:100%" onclick="closeModal();syncToGist()">Sync Now</button>
      <button class="modal-btn secondary" style="width:100%" onclick="closeModal();if(confirm('Replace local board with cloud backup?'))loadFromGist().then(()=>render())">Restore from Cloud</button>
      <button class="modal-btn secondary" style="width:100%;color:#ef4444" onclick="disconnectSync()">Disconnect</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function disconnectSync(){
  if(!confirm('Disconnect cloud sync? Your data stays in the gist.'))return;
  _gistToken=null;_gistId=null;
  localStorage.removeItem('vhi-gist-token');
  localStorage.removeItem('vhi-gist-id');
  closeModal();updateSyncBtn();setSyncStatus('off','');
}

function updateSyncBtn(){
  const btn=document.getElementById('syncBtn');
  btn.classList.toggle('active',!!(_gistToken&&_gistId));
}

// Init sync state
updateSyncBtn();
render();

if(_gistToken&&_gistId){
  (async function(){
    const hasData=STORAGE_KEYS.some(k=>localStorage.getItem(k)!==null);
    if(!hasData){
      setSyncStatus('saving','restoring from cloud...');
      const ok=await loadFromGist();
      if(ok)render();
      return;
    }
    setSyncStatus('saving','checking cloud...');
    try{
      const r=await fetch('https://api.github.com/gists/'+_gistId+'?t='+Date.now(),{
        headers:{'Authorization':'Bearer '+_gistToken,'Accept':'application/vnd.github+json'}
      });
      if(!r.ok)throw new Error(r.status);
      const gist=await r.json();
      const file=gist.files['vhi-kanban-backup.json'];
      if(!file){setSyncStatus('ok','synced');return}
      const cloudData=JSON.parse(file.content);
      const cloudTime=cloudData._syncDate?new Date(cloudData._syncDate).getTime():0;
      const localTime=localStorage.getItem('vhi-last-sync')?new Date(localStorage.getItem('vhi-last-sync')).getTime():0;
      if(cloudTime>localTime){
        setSyncStatus('saving','newer cloud version found...');
        STORAGE_KEYS.forEach(k=>{if(k in cloudData)localStorage.setItem(k,JSON.stringify(cloudData[k]));else localStorage.removeItem(k)});
        localStorage.setItem('vhi-last-sync',cloudData._syncDate);
        reloadState();render();
        setSyncStatus('ok','restored from cloud');
      }else{
        setSyncStatus('ok','synced');
      }
    }catch(e){
      console.error('Sync check failed:',e);
      setSyncStatus('err','sync check failed');
    }
  })();
}
</script>
